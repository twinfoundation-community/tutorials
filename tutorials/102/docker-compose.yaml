name: 'TWIN Node 102'

services:
  db:
    image: mysql:8.4.7
    container_name: mysql8_container
    hostname: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: twin
      MYSQL_PASSWORD: twin
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u twin -ptwin --silent || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  twin-node:
    image: twinfoundation/twin-node:0.0.3-next.46
    container_name: twin_node
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file: ../../common/.env.local
    volumes: 
      - twin_data:/var/lib/twin
      - ../../common/.env.local.bootstrap:/app/.env.local.bootstrap
      - ./dataspace-example-app:/app/node_modules/@twin-community.org/dataspace-example-app
      - ./consumer-client:/app/node_modules/@twin-community.org/consumer-client
      - ./tutorial-data/provider.json:/app/provider.json
      - ./tutorial-data/consumer.json:/app/consumer.json
      
volumes:
  mysql_data:
  twin_data:
