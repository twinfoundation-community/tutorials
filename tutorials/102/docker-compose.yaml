name: "TWIN Node 102"

services:
  db:
    image: mysql:8.4.7
    container_name: mysql8_container
    hostname: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: twin
      MYSQL_PASSWORD: twin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u twin -ptwin --silent || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../common/init:/docker-entrypoint-initdb.d

  twin-node:
    # Published image. next.67 bakes twin-node 0.0.3-next.67, dataspace
    # control+data-plane+models 0.0.3-next.55, federated-catalogue 0.0.3-next.24
    # (bumped from .23), engine-core 0.0.3-next.56, rights-management/core 0.9.0-next.1.
    # NOTE: the @next dist-tag jumped to 0.9.0-next.1 for dataspace/fedcat/engine, but the
    # extensions' floating "next" deps still resolve to the image-aligned 0.0.3 line via
    # dependency-graph constraints, so build + runtime stay consistent with this image.
    # Verified against the pulled image 2026-06-24. Bump the tag to pin a newer build.
    image: twinfoundation/twin-node:0.0.3-next.67
    # Local build (only needed when Docker Hub lags the refactor — kept for reference):
    # build:
    #   context: ../../../twin-node
    #   dockerfile: apps/node/tests/kenyaCommunityUseCaseDefaultArbiter/Dockerfile
    container_name: twin_node
    hostname: node
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ../../common/.env.local
      - ./.env.extensions
      - ./.env.multitenant
    volumes:
      - twin_data:/var/lib/twin
      - ../../common/.env.local.bootstrap:/app/.env.local.bootstrap
      - ../../common/.env.bootstrap-legacy:/app/.env.bootstrap-legacy
      - ./apps/dataspace-example-app:/app/node_modules/@twin-community.org/dataspace-example-app
      - ./apps/consumer-client:/app/node_modules/@twin-community.org/consumer-client
      - ./tutorial-data/provider.json:/app/provider.json
      - ./tutorial-data/consumer.json:/app/consumer.json
volumes:
  mysql_data:
  twin_data:
